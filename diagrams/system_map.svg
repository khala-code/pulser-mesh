<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1100" viewBox="0 0 1600 1100" role="img" aria-labelledby="title desc">
  <title id="title">Pulser Mesh system map</title>
  <desc id="desc">A high-level architecture diagram showing the relationships between the node tuple, scarcity schema, value-add transformation schema, consent check, validation and checkpoint logic, dividend currency, food adapter, and the 12+1D substrate.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8f7f3"/>
      <stop offset="100%" stop-color="#f1efe9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M1,1 L13,7 L1,13" fill="none" stroke="#0d5b60" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .title { font: 700 42px 'Inter', 'Helvetica Neue', Arial, sans-serif; fill: #26231c; }
      .subtitle { font: 400 20px 'Inter', 'Helvetica Neue', Arial, sans-serif; fill: #6f6d67; }
      .box-title { font: 700 24px 'Inter', 'Helvetica Neue', Arial, sans-serif; fill: #1f1d17; }
      .box-copy { font: 400 17px 'Inter', 'Helvetica Neue', Arial, sans-serif; fill: #4f4d47; }
      .small { font: 600 14px 'Inter', 'Helvetica Neue', Arial, sans-serif; letter-spacing: 0.08em; text-transform: uppercase; fill: #7d7a73; }
      .edge { stroke: #0d5b60; stroke-width: 3; fill: none; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow); }
      .edge-soft { stroke: #7b8f8f; stroke-width: 2.25; fill: none; stroke-dasharray: 8 8; stroke-linecap: round; }
      .box { fill: #fcfbf8; stroke: #d7d3cb; stroke-width: 1.5; rx: 24; filter: url(#shadow); }
      .box-accent { fill: #f7faf9; stroke: #7ca6a1; stroke-width: 2; rx: 24; filter: url(#shadow); }
      .substrate { fill: #e8ecea; stroke: #8ba7a2; stroke-width: 2; rx: 28; }
      .pill { fill: #dce8e5; stroke: #a2b9b5; stroke-width: 1; rx: 999; }
    </style>
  </defs>

  <rect x="0" y="0" width="1600" height="1100" fill="url(#bg)"/>

  <text x="110" y="90" class="title">Pulser Mesh system map</text>
  <text x="110" y="126" class="subtitle">Core protocol documents, validation flow, and the shared substrate beneath them</text>

  <rect x="90" y="170" width="1420" height="820" class="substrate"/>
  <text x="120" y="215" class="small">Underlying interface layer</text>
  <text x="120" y="248" class="box-title">12+1D substrate</text>
  <text x="120" y="278" class="box-copy">Canonical geometry, boundary projection, reproducible encoding,</text>
  <text x="120" y="303" class="box-copy">and future ZKP compilation target.</text>

  <rect x="150" y="360" width="300" height="170" class="box"/>
  <text x="180" y="402" class="box-title">Node tuple</text>
  <text x="180" y="434" class="box-copy">Identity, grounding, mission,</text>
  <text x="180" y="459" class="box-copy">embedding, growth, coherence.</text>
  <rect x="180" y="480" width="140" height="32" class="pill"/>
  <text x="199" y="501" class="small">Participant state</text>

  <rect x="505" y="360" width="300" height="170" class="box-accent"/>
  <text x="535" y="402" class="box-title">Scarcity schema</text>
  <text x="535" y="434" class="box-copy">Triadic rotor for scarcity:</text>
  <text x="535" y="459" class="box-copy">sine, cosine, tangent.</text>
  <rect x="535" y="480" width="164" height="32" class="pill"/>
  <text x="555" y="501" class="small">Measurement grammar</text>

  <rect x="860" y="360" width="300" height="170" class="box"/>
  <text x="890" y="402" class="box-title">Value-add transformation</text>
  <text x="890" y="434" class="box-copy">Input → method → output</text>
  <text x="890" y="459" class="box-copy">with rotor-channel impact.</text>
  <rect x="890" y="480" width="170" height="32" class="pill"/>
  <text x="912" y="501" class="small">Action bridge</text>

  <rect x="1215" y="360" width="240" height="170" class="box"/>
  <text x="1245" y="402" class="box-title">Food adapter</text>
  <text x="1245" y="434" class="box-copy">First domain mapping</text>
  <text x="1245" y="459" class="box-copy">into the rotor schema.</text>
  <rect x="1245" y="480" width="125" height="32" class="pill"/>
  <text x="1263" y="501" class="small">Domain test</text>

  <rect x="270" y="640" width="300" height="180" class="box"/>
  <text x="300" y="682" class="box-title">Consent check</text>
  <text x="300" y="714" class="box-copy">A counted relation exists only</text>
  <text x="300" y="739" class="box-copy">when relevant observers take</text>
  <text x="300" y="764" class="box-copy">the tangent path together.</text>
  <rect x="300" y="785" width="156" height="32" class="pill"/>
  <text x="320" y="806" class="small">Edge admissibility</text>

  <rect x="650" y="625" width="370" height="210" class="box-accent"/>
  <text x="680" y="667" class="box-title">Validation + checkpoint</text>
  <text x="680" y="699" class="box-copy">Envelope, entity, edge, graph,</text>
  <text x="680" y="724" class="box-copy">scarcity alignment, coherence,</text>
  <text x="680" y="749" class="box-copy">downweighting, surplus, payout.</text>
  <rect x="680" y="784" width="194" height="32" class="pill"/>
  <text x="700" y="805" class="small">Protocol boundary</text>

  <rect x="1100" y="640" width="300" height="180" class="box"/>
  <text x="1130" y="682" class="box-title">Dividend currency</text>
  <text x="1130" y="714" class="box-copy">Checkpoint-emitted pulse unit</text>
  <text x="1130" y="739" class="box-copy">derived from validated surplus.</text>
  <rect x="1130" y="785" width="155" height="32" class="pill"/>
  <text x="1151" y="806" class="small">Downstream settlement</text>

  <path d="M450 445 C470 445, 485 445, 505 445" class="edge"/>
  <path d="M805 445 C825 445, 840 445, 860 445" class="edge"/>
  <path d="M1160 445 C1180 445, 1195 445, 1215 445" class="edge-soft"/>

  <path d="M300 530 C300 575, 300 600, 355 640" class="edge"/>
  <path d="M655 530 C655 575, 700 595, 770 625" class="edge"/>
  <path d="M1010 530 C1010 580, 920 595, 860 625" class="edge"/>
  <path d="M1335 530 C1335 585, 1080 585, 980 625" class="edge-soft"/>

  <path d="M570 730 C605 730, 620 730, 650 730" class="edge"/>
  <path d="M1020 730 C1050 730, 1070 730, 1100 730" class="edge"/>

  <path d="M240 320 C240 280, 240 265, 240 250" class="edge-soft"/>
  <path d="M595 320 C595 280, 595 265, 595 250" class="edge-soft"/>
  <path d="M950 320 C950 280, 950 265, 950 250" class="edge-soft"/>
  <path d="M1330 320 C1330 280, 1330 265, 1330 250" class="edge-soft"/>
  <path d="M420 610 C420 570, 420 285, 420 250" class="edge-soft"/>
  <path d="M835 600 C835 560, 835 285, 835 250" class="edge-soft"/>
  <path d="M1230 610 C1230 570, 1230 285, 1230 250" class="edge-soft"/>

  <text x="116" y="945" class="subtitle">Reading order for newcomers: Node tuple → Scarcity schema → Value-add transformation → Consent → Validation + checkpoint → Dividend pulse</text>
  <text x="116" y="978" class="subtitle">The food adapter is shown as the first concrete domain implementation, while the 12+1D substrate remains the shared layer under every object.</text>
</svg>
